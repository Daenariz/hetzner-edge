name: Build Hosts

on:
  pull_request:
    branches:
      - master
      - develop

jobs:
  flake-check:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      - run: nix flake check

  build-hosts:
    runs-on: self-hosted
    needs: flake-check

    steps:
      - uses: actions/checkout@v4
      - run: |
          nix build .#nixosConfigurations.portuus.config.system.build.toplevel
          nix build .#nixosConfigurations.edge.config.system.build.toplevel
